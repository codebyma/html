<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 탐색 결과</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #dcdcdc;
            padding: 20px;
        }
        #wrap {
            max-width: 800px;
            margin: 0 auto;
        }
        .element-box {
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .element-box h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #61dafb;
        }
        .element-box p {
            margin: 2px 0;
            padding-left: 10px;
            color: #c5c8c6;
        }
        .node-type {
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <h1>DOM 탐색 결과</h1>
        <div id="output" class="element-box"></div>

        <div id="parent">
            <div id="firstChild">firstChild</div>
            <div id="self">
                self
                <div id="child1">child1</div>
                <div id="child2">child2</div>
            </div>
            <div id="lastChild">lastChild</div>
        </div>
    </div>

    <script>
        function showResult(title, value) {
            const container = document.getElementById('output');
            const section = document.createElement('div');
            const heading = document.createElement('h3');
            heading.textContent = title;
            const paragraph = document.createElement('p');

            if(value instanceof NodeList || value instanceof HTMLCollection || Array.isArray(value)) {
                paragraph.innerHTML = Array.from(value).map(v => {
                    if(v.nodeType === 3) return `<span class="node-type">#text:</span> "${v.textContent.trim()}"`;
                    return `<span class="node-type">#element:</span> &lt;${v.id || v.tagName}&gt;`;
                }).join('<br>');
            } else if(value.nodeType) {
                if(value.nodeType === 3) paragraph.innerHTML = `<span class="node-type">#text:</span> "${value.textContent.trim()}"`;
                else paragraph.innerHTML = `<span class="node-type">#element:</span> &lt;${value.id || value.tagName}&gt;`;
            } else {
                paragraph.textContent = value;
            }

            section.appendChild(heading);
            section.appendChild(paragraph);
            container.appendChild(section);
        }

        const self = document.querySelector('#self');

        // Node 기반 탐색
        showResult('self', self);
        showResult('parentNode', self.parentNode);
        showResult('firstChild', self.firstChild);
        showResult('lastChild', self.lastChild);
        showResult('childNodes', self.childNodes);
        showResult('previousSibling', self.previousSibling);
        showResult('nextSibling', self.nextSibling);

        // Element 기반 탐색
        showResult('parentElement', self.parentElement);
        showResult('firstElementChild', self.firstElementChild);
        showResult('lastElementChild', self.lastElementChild);
        showResult('children', self.children);
        showResult('previousElementSibling', self.previousElementSibling);
        showResult('nextElementSibling', self.nextElementSibling);
    </script>
</body>
</html>
