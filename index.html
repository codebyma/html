<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>동적 링크 디자인</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 50px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    li+li{
      margin-top:8px;
    }

    a {
      display: block;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <ul id="link-list"></ul>

  <script>
    const items = [ 
      { title: "텍스트_배열_순차변경" },
      { title: "css_타이핑_애니" },
      { title: "DOM_요소찾기" }, 
    ];

    const listContainer = document.getElementById("link-list");

    items.forEach(item => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      const trimmedTitle = item.title.trim(); // 앞뒤 공백 제거
      a.textContent = trimmedTitle;
      a.href = `./${trimmedTitle}.html`; // 링크 생성
      li.appendChild(a);
      listContainer.appendChild(li);
    });
  </script>

</body>
</html>
