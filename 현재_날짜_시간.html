<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날짜 & 시간 예제</title>
    <script type="text/javascript" src="./js/common.js"> </script>
    <link type="text/css" rel="stylesheet" href="./css/common.css">
</head>

<body>
    <div class="guide">
        <h1 class="guide__header">현재 날짜 & 시간</h1>

        <div class="guide__view">
            <div class="guide__view-title">결과</div>
            <div id="getTodayDate" class="guide__view-text"></div>
        </div>

        <div class="guide__btn-wrap">
            <div class="guide__btn-title">현재 날짜</div>
            <button type="button" data-fn-target="getTodayDate" class="guide__btn">getTodayDate()</button>
        </div>
        <div class="guide__btn-wrap">
            <div class="guide__btn-title">현재 시간</div>
            <button type="button" data-fn-target="getTodayDate" class="guide__btn">getCurrentTime()</button>
        </div>
        <div class="guide__btn-wrap">
            <div class="guide__btn-title">현재 날짜+시간</div>
            <button type="button" data-fn-target="getTodayDate" class="guide__btn">getDateTime()</button>
        </div>
    </div>

    <script>
        function getTodayDate() {
            const now = new Date();

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            return `${year}.${month}.${day}`;
        }

        function getCurrentTime() {
            const now = new Date();

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            return `${hours}:${minutes}:${seconds}`;
        }

        function getDateTime() {
            return `${getTodayDate()} ${getCurrentTime()}`;
        }
    </script>

</body>

</html>
